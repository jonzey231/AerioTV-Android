name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: App Version
      description: What version of the app are you running?
      placeholder: e.g. v0.1.3
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device / Environment
      description: Device model, Android version, and any relevant context (phone, tablet, Android TV / Google TV)
      placeholder: e.g. Pixel 8, Android 14 / Google TV Streamer, Android 14
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Detailed Description
      description: What happened? What did you expect to happen? Include steps to reproduce, logs, screenshots, and any other context.
      placeholder: |
        **Steps to reproduce:**
        1.
        2.
        3.

        **Expected behavior:**

        **Actual behavior:**

        **Logs / screenshots:**
    validations:
      required: true
